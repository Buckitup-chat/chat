<!--
  WebRTC Device Chat

  Auto-connects to the first accessible BuckitUp node from a fallback chain,
  joins a device-specific room, and provides a simple chat between peers
  sharing the same device fingerprint + LAN IP.

  Flow:
  1. Compute device fingerprint: SHA-256(cores|screen|touch|dpr|tz) → 12-char hex.
  2. Try WebSocket to each domain in order: localhost:4444, buckitup.app, buckitup.xyz.
  3. On first successful connection, join room:identify:{hash}.
  4. Server rejects with redirect → join room:device:{ip}:{hash}.
  5. Chat with other peers in the same room.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }

        /* Status bar */
        .status-bar {
            background: #16213e;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.connecting { background: #ffc107; animation: pulse 1s infinite; }
        .status-dot.joined { background: #28a745; }
        .status-dot.error { background: #dc3545; }
        .status-dot.disconnected { background: #6c757d; }
        @keyframes pulse { 50% { opacity: 0.4; } }

        .status-info {
            flex: 1; font-size: 12px; font-family: monospace;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .status-info .label { color: #888; }
        .status-info .value { color: #a8d8ea; }

        .fingerprint {
            font-size: 11px; font-family: monospace;
            color: #666; cursor: pointer;
        }
        .fingerprint:hover { color: #a8d8ea; }

        /* Chat log */
        .chat-log {
            flex: 1; overflow-y: auto; padding: 12px 16px;
            display: flex; flex-direction: column; gap: 4px;
        }

        .msg { font-size: 13px; line-height: 1.5; font-family: monospace; }
        .msg .time { color: #555; }
        .msg .sender { font-weight: 600; }
        .msg.system { color: #666; font-style: italic; }
        .msg.system .sender { color: #666; }
        .msg.self .sender { color: #667eea; }
        .msg.peer .sender { color: #28a745; }
        .msg.ping .sender { color: #ffc107; }

        .empty-state {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: #444; font-size: 14px;
        }

        /* Input bar */
        .input-bar {
            background: #16213e;
            padding: 10px 16px;
            display: flex; gap: 10px;
            border-top: 1px solid #0f3460;
            flex-shrink: 0;
        }
        .input-bar input {
            flex: 1; padding: 10px 14px;
            background: #1a1a2e; border: 1px solid #0f3460;
            border-radius: 8px; color: #e0e0e0;
            font-size: 14px; outline: none;
        }
        .input-bar input:focus { border-color: #667eea; }
        .input-bar input::placeholder { color: #444; }

        .input-bar button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            font-size: 13px;
        }
        .input-bar button:hover { opacity: 0.9; }
        .input-bar button:disabled { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>
    <!-- Status bar -->
    <div class="status-bar">
        <span class="status-dot disconnected" id="statusDot"></span>
        <div class="status-info" id="statusInfo">
            <span class="label">Connecting...</span>
        </div>
        <span class="fingerprint" id="fingerprint" title="Click to copy">---</span>
    </div>

    <!-- Chat log -->
    <div class="chat-log" id="chatLog">
        <div class="empty-state">Connecting to BuckitUp node...</div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
        <input id="messageInput" placeholder="Type a message..." disabled>
        <button id="sendBtn" disabled>Send</button>
    </div>

    <script>
    // === Minimal Phoenix Channel Client (v2 JSON protocol) ===

    class PhxSocket {
        constructor(baseUrl) {
            this.baseUrl = baseUrl;
            this.ws = null;
            this.ref = 0;
            this.channels = new Map();
            this.heartbeatTimer = null;
            this.reconnectTimer = null;
            this.reconnectAttempts = 0;
            this.onStatusChange = null;
            this._closed = false;
        }

        connect() {
            return new Promise((resolve, reject) => {
                this._closed = false;
                const wsUrl = this.baseUrl.replace(/^http/, 'ws')
                    + '/webrtc-socket/websocket?vsn=2.0.0';
                try {
                    this.ws = new WebSocket(wsUrl);
                } catch {
                    reject(new Error('WebSocket creation failed'));
                    return;
                }

                const timeout = setTimeout(() => {
                    this.ws.close();
                    reject(new Error('Connection timeout'));
                }, 5000);

                this.ws.onopen = () => {
                    clearTimeout(timeout);
                    this.reconnectAttempts = 0;
                    this._startHeartbeat();
                    for (const ch of this.channels.values()) ch._doJoin();
                    this.onStatusChange?.('connected');
                    resolve();
                };

                this.ws.onmessage = (e) => {
                    const [, ref, topic, event, payload] = JSON.parse(e.data);
                    const ch = this.channels.get(topic);
                    if (ch) ch._handleMsg(event, payload, ref);
                };

                this.ws.onclose = () => {
                    clearTimeout(timeout);
                    this._stopHeartbeat();
                    for (const ch of this.channels.values()) ch.joined = false;
                    this.onStatusChange?.('disconnected');
                    if (!this._closed) this._scheduleReconnect();
                };

                this.ws.onerror = () => {
                    clearTimeout(timeout);
                    this.onStatusChange?.('error');
                    reject(new Error('WebSocket error'));
                };
            });
        }

        channel(topic, params = {}) {
            const ch = new PhxChannel(this, topic, params);
            this.channels.set(topic, ch);
            if (this.ws?.readyState === WebSocket.OPEN) ch._doJoin();
            return ch;
        }

        removeChannel(topic) { this.channels.delete(topic); }
        nextRef() { return String(++this.ref); }

        send(msg) {
            if (this.ws?.readyState === WebSocket.OPEN)
                this.ws.send(JSON.stringify(msg));
        }

        _startHeartbeat() {
            this.heartbeatTimer = setInterval(() => {
                this.send([null, this.nextRef(), 'phoenix', 'heartbeat', {}]);
            }, 30000);
        }

        _stopHeartbeat() { clearInterval(this.heartbeatTimer); }

        _scheduleReconnect() {
            clearTimeout(this.reconnectTimer);
            const delay = Math.min(1000 * 2 ** this.reconnectAttempts++, 30000);
            this.reconnectTimer = setTimeout(() => {
                this.connect().catch(() => {});
            }, delay);
        }

        disconnect() {
            this._closed = true;
            clearTimeout(this.reconnectTimer);
            this._stopHeartbeat();
            this.ws?.close();
        }
    }

    class PhxChannel {
        constructor(socket, topic, params) {
            this.socket = socket;
            this.topic = topic;
            this.params = params;
            this.joinRef = null;
            this.joined = false;
            this.onJoin = null;
            this.onMessage = null;
            this.onError = null;
        }

        _doJoin() {
            this.joinRef = this.socket.nextRef();
            this.socket.send([
                this.joinRef, this.joinRef, this.topic, 'phx_join', this.params
            ]);
        }

        _handleMsg(event, payload, ref) {
            if (event === 'phx_reply' && ref === this.joinRef) {
                if (payload.status === 'ok') {
                    this.joined = true;
                    this.onJoin?.(payload.response);
                } else {
                    this.onError?.(payload.response);
                }
            } else if (event === 'phx_error') {
                this.joined = false;
                this.onError?.(payload);
            } else if (event !== 'phx_reply' && event !== 'phx_close') {
                this.onMessage?.(event, payload);
            }
        }

        push(event, payload) {
            if (this.joined) {
                this.socket.send([
                    this.joinRef, this.socket.nextRef(), this.topic, event, payload
                ]);
            }
        }
    }

    // === Helpers ===

    function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function ts() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // === FNV-1a 32-bit hash → hex string ===

    function fnv1a(str) {
        let h = 0x811c9dc5;
        for (let i = 0; i < str.length; i++) {
            h ^= str.charCodeAt(i);
            h = Math.imul(h, 0x01000193);
        }
        return (h >>> 0).toString(16).padStart(8, '0');
    }

    // === Device Fingerprint: hash(touch|dpr|tz) → 8 hex chars ===

    function computeDeviceHash() {
        const parts = [
            navigator.maxTouchPoints || 0,
            devicePixelRatio || 1,
            Intl.DateTimeFormat().resolvedOptions().timeZone
        ].join('|');
        console.log('fingerprint parts:', parts);
        return fnv1a(parts);
    }

    // === Domain fallback chain ===

    const DOMAIN_CHAIN = [
        'http://localhost:4444',
        'https://buckitup.app',
        'https://buckitup.xyz'
    ];

    // === State ===

    let deviceHash = null;
    let activeSocket = null;
    let activeChannel = null;
    let activeDomain = null;
    let userId = null;
    let logStarted = false;

    const chatLog = document.getElementById('chatLog');
    const statusDot = document.getElementById('statusDot');
    const statusInfo = document.getElementById('statusInfo');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // === UI ===

    function setStatus(state, text) {
        statusDot.className = `status-dot ${state}`;
        statusInfo.innerHTML = text;
    }

    function addMessage(text, type = 'system', sender = null) {
        if (!logStarted) { chatLog.innerHTML = ''; logStarted = true; }
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        const time = `<span class="time">[${ts()}]</span>`;
        const who = sender ? `<span class="sender">${esc(sender)}</span> ` : '';
        div.innerHTML = `${time} ${who}${esc(text)}`;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function enableInput(enabled) {
        messageInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (enabled) messageInput.focus();
    }

    // === Connection ===

    async function tryConnect(domains) {
        for (const baseUrl of domains) {
            const host = new URL(baseUrl).host;
            setStatus('connecting', `<span class="label">Trying</span> <span class="value">${esc(host)}</span>`);
            addMessage(`Trying ${host}...`);

            const socket = new PhxSocket(baseUrl);
            // Disable auto-reconnect during probing — we handle fallback ourselves
            socket._closed = true;
            try {
                await socket.connect();
            } catch {
                socket.disconnect();
                addMessage(`${host} — unreachable`);
                continue;
            }

            // Phase 1: identify → get room redirect
            const room = await new Promise((resolve, reject) => {
                const topic = `room:identify:${deviceHash}`;
                const ch = socket.channel(topic, {});
                ch.onError = (response) => {
                    socket.removeChannel(topic);
                    if (response?.reason === 'redirect' && response?.room) {
                        resolve(response.room);
                    } else {
                        reject(new Error('Identify failed'));
                    }
                };
                setTimeout(() => reject(new Error('Identify timeout')), 5000);
            }).catch(err => {
                addMessage(`${host} — ${err.message}`);
                socket.disconnect();
                return null;
            });

            if (!room) continue;

            // Phase 2: join the device room
            const roomTopic = `room:${room}`;
            // room is "device:<ip>:<hash>" — extract ip
            const peerIp = room.split(':').slice(1, -1).join(':');
            const origin = location.hostname || 'local';
            userId = `client_${origin}_${fnv1a(`${deviceHash}${peerIp}${Date.now()}${Math.random()}`)}`;
            const channel = socket.channel(roomTopic, { user_id: userId });

            const joined = await new Promise((resolve) => {
                channel.onJoin = () => resolve(true);
                channel.onError = (err) => {
                    addMessage(`${host} — room error: ${JSON.stringify(err)}`);
                    resolve(false);
                };
                setTimeout(() => resolve(false), 5000);
            });

            if (!joined) {
                socket.disconnect();
                continue;
            }

            // Success — now enable auto-reconnect for the active connection
            socket._closed = false;
            activeSocket = socket;
            activeChannel = channel;
            activeDomain = baseUrl;

            setStatus('joined',
                `<span class="value">${esc(host)}</span>` +
                ` <span class="label">room:</span><span class="value">${esc(room)}</span>`
            );
            addMessage(`Connected to ${host} — room: ${room}`);
            enableInput(true);

            // Handle incoming messages
            channel.onMessage = (event, payload) => {
                if (event === 'signal') {
                    const { from, data } = payload;
                    if (!data || from === userId) return;

                    if (data.type === 'message') {
                        addMessage(data.text, 'peer', from);
                    } else if (data.type === 'ping') {
                        addMessage('PING', 'ping', from);
                        channel.push('signal', {
                            to: from, data: { type: 'pong' }
                        });
                    } else if (data.type === 'pong') {
                        addMessage('PONG', 'ping', from);
                    }
                } else if (event === 'user_joined') {
                    if (payload.user_id !== userId)
                        addMessage(`${payload.user_id} joined`);
                } else if (event === 'user_left') {
                    if (payload.user_id !== userId)
                        addMessage(`${payload.user_id} left`);
                }
            };

            // On disconnect → restart full fallback chain
            socket.onStatusChange = (status) => {
                if (status === 'disconnected') {
                    activeSocket = null;
                    activeChannel = null;
                    activeDomain = null;
                    setStatus('disconnected', '<span class="label">Disconnected — reconnecting...</span>');
                    enableInput(false);
                    addMessage('Disconnected, retrying chain...');
                    socket.disconnect(); // stop internal reconnect
                    setTimeout(() => tryConnect(DOMAIN_CHAIN), 2000);
                }
            };

            return; // connected successfully
        }

        // All domains failed
        setStatus('error', '<span class="label">All nodes unreachable</span>');
        addMessage('All nodes unreachable. Retrying in 10s...');
        setTimeout(() => tryConnect(DOMAIN_CHAIN), 10000);
    }

    // === Sending ===

    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !activeChannel?.joined) return;

        activeChannel.push('signal', {
            to: 'all', data: { type: 'message', text }
        });
        addMessage(text, 'self', 'you');
        messageInput.value = '';
    }

    // === Event wiring ===

    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    document.getElementById('fingerprint').onclick = () => {
        navigator.clipboard.writeText(deviceHash);
        addMessage('Fingerprint copied');
    };

    // === Init ===

    deviceHash = computeDeviceHash();
    document.getElementById('fingerprint').textContent = deviceHash;
    addMessage(`Device: ${deviceHash}`);
    tryConnect(DOMAIN_CHAIN);
    </script>
</body>
</html>
